<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Portal Organisasi Mahasiswa untuk manajemen absensi, berita acara, dan dokumentasi kegiatan." />
    <title>Portal Organisasi Mahasiswa</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🎓</text></svg>" />
    <script>
      // Suppress and intercept benign Vite WebSocket connection errors in sandboxed dev environment
      window.addEventListener('unhandledrejection', function(event) {
        const reasonStr = event.reason ? String(event.reason.message || event.reason) : '';
        if (
          reasonStr.toLowerCase().includes('websocket') || 
          reasonStr.toLowerCase().includes('ws://') ||
          reasonStr.toLowerCase().includes('closed without opened')
        ) {
          event.preventDefault();
          event.stopImmediatePropagation();
          console.warn('Benign WebSocket rejection suppressed:', event.reason);
        }
      }, true);
      window.addEventListener('error', function(event) {
        const errorMsg = event.message ? String(event.message) : '';
        if (
          errorMsg.toLowerCase().includes('websocket') || 
          errorMsg.toLowerCase().includes('ws://') ||
          errorMsg.toLowerCase().includes('closed without opened')
        ) {
          event.preventDefault();
          event.stopImmediatePropagation();
          console.warn('Benign WebSocket error suppressed:', event.message);
        }
      }, true);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
